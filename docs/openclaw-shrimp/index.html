<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw 养虾攻略（Agent 版）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: { 850: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    .prose-custom h1 { font-size: 2rem; line-height: 1.2; margin-bottom: 1rem; color: white; font-weight: 800; }
    .prose-custom h2 { font-size: 1.5rem; line-height: 1.3; margin-top: 2.2rem; margin-bottom: 1rem; color: white; font-weight: 700; }
    .prose-custom h3 { font-size: 1.125rem; line-height: 1.4; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #e2e8f0; font-weight: 700; }
    .prose-custom p, .prose-custom li { color: #cbd5e1; line-height: 1.85; }
    .prose-custom ul { padding-left: 1.25rem; list-style: disc; }
    .prose-custom ol { padding-left: 1.25rem; list-style: decimal; }
    .prose-custom blockquote { border-left: 4px solid #6366f1; padding-left: 1rem; color: #e2e8f0; margin: 1rem 0; font-style: italic; }
    .prose-custom code { background: #0f172a; color: #e2e8f0; padding: 0.15rem 0.35rem; border-radius: 0.35rem; }
    .prose-custom pre { background: #0f172a; color: #e2e8f0; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; }
    .prose-custom strong { color: #f8fafc; }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen font-sans selection:bg-indigo-500 selection:text-white">
  <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <span class="text-2xl">🦞</span>
        <h1 class="text-xl font-bold tracking-tight text-white">OpenClaw 养虾攻略</h1>
      </div>
      <a href="../../index.html" class="text-slate-300 hover:text-white transition-colors px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-800">← 返回主页</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="mb-10">
      <div class="inline-flex items-center gap-2 rounded-full border border-indigo-500/30 bg-indigo-500/10 px-3 py-1 text-sm text-indigo-300">Agent Guide</div>
      <h2 class="mt-4 text-4xl font-extrabold text-white tracking-tight">给 Agent 看的 OpenClaw 养虾攻略</h2>
      <p class="mt-4 text-lg text-slate-400 max-w-3xl">这是一份面向 Agent / 高级用户的工作文档，重点不在宣传 OpenClaw，而在于解释：为什么要“养虾”、怎么把它用成长期协作系统、以及哪些实践已经被真实跑通。</p>
    </div>

    <article class="prose-custom bg-slate-800/60 border border-slate-700 rounded-2xl p-6 sm:p-8 shadow-xl shadow-black/10">
      <div id="content" class="space-y-4"></div>
    </article>
  </main>

  <footer class="border-t border-slate-800 mt-auto py-8 bg-slate-900">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-slate-500 text-sm">
      <p>OpenClaw Shrimp Guide · Agent-facing page</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    async function loadMarkdown() {
      const container = document.getElementById('content');
      try {
        const res = await fetch('./README.md');
        if (!res.ok) throw new Error('Failed to load README.md');
        const md = await res.text();
        container.innerHTML = marked.parse(md);
      } catch (err) {
        container.innerHTML = `<div class="text-red-400">加载文档失败：${err.message}</div>`;
      }
    }
    loadMarkdown();
  </script>
</body>
</html>
